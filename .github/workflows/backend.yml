name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "backend-worker/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "backend-worker/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run mypy src/

      - name: Test
        run: uv run pytest --cov=mam_pivko --cov-report=term-missing

  worker-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-worker

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check Worker
        run: npm run typecheck

  deploy-worker:
    runs-on: ubuntu-latest
    needs: [lint-and-test, worker-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend-worker

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAM_MONGODB_URI: ${{ vars.MAM_MONGODB_URI }}
          MAM_GOOGLE_CLIENT_ID: ${{ vars.MAM_GOOGLE_CLIENT_ID }}
          MAM_ALLOWED_EMAILS: ${{ vars.MAM_ALLOWED_EMAILS }}
          MAM_CORS_ORIGINS: ${{ vars.MAM_CORS_ORIGINS }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$MAM_MONGODB_URI"
          test -n "$MAM_GOOGLE_CLIENT_ID"
          test -n "$MAM_ALLOWED_EMAILS"
          test -n "$MAM_CORS_ORIGINS"

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

      - name: Configure Worker runtime secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAM_MONGODB_URI: ${{ vars.MAM_MONGODB_URI }}
          MAM_GOOGLE_CLIENT_ID: ${{ vars.MAM_GOOGLE_CLIENT_ID }}
          MAM_ALLOWED_EMAILS: ${{ vars.MAM_ALLOWED_EMAILS }}
          MAM_CORS_ORIGINS: ${{ vars.MAM_CORS_ORIGINS }}
        run: |
          printf 'MAM_MONGODB_URI=%s\nMAM_GOOGLE_CLIENT_ID=%s\nMAM_ALLOWED_EMAILS=%s\nMAM_CORS_ORIGINS=%s\n' \
            "$MAM_MONGODB_URI" \
            "$MAM_GOOGLE_CLIENT_ID" \
            "$MAM_ALLOWED_EMAILS" \
            "$MAM_CORS_ORIGINS" \
            | npx wrangler secret bulk
